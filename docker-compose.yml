services:
  db:
    image: postgres:15
    container_name: ducks-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ducks
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ducks"]
      interval: 5s
      timeout: 5s
      retries: 10

  etl:
    build: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
